<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grocery Detector — AI Vision System</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0f14;
    --surface: #141920;
    --border: #1f2a35;
    --accent: #00e5a0;
    --accent2: #0090ff;
    --warn: #ffb800;
    --text: #e8edf2;
    --muted: #556070;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
  }

  /* ── Header ── */
  header {
    padding: 24px 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo-icon {
    width: 40px; height: 40px;
    background: var(--accent);
    border-radius: 10px;
    display: grid;
    place-items: center;
    font-size: 20px;
  }
  header h1 {
    font-family: var(--mono);
    font-size: 18px;
    letter-spacing: -0.5px;
  }
  .badge {
    margin-left: auto;
    font-size: 11px;
    font-family: var(--mono);
    padding: 4px 10px;
    background: color-mix(in srgb, var(--accent) 15%, transparent);
    color: var(--accent);
    border: 1px solid color-mix(in srgb, var(--accent) 40%, transparent);
    border-radius: 20px;
  }

  /* ── Main Layout ── */
  main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    max-width: 1200px;
    width: 100%;
    margin: 0 auto;
    padding: 40px;
    gap: 32px;
  }

  /* ── Upload Panel ── */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }
  .panel-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-header::before {
    content: '';
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }
  .panel-body { padding: 24px; }

  /* ── Drop Zone ── */
  #drop-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    position: relative;
  }
  #drop-zone:hover, #drop-zone.drag-over {
    border-color: var(--accent);
    background: color-mix(in srgb, var(--accent) 5%, transparent);
  }
  #drop-zone .icon { font-size: 40px; margin-bottom: 12px; }
  #drop-zone p { color: var(--muted); font-size: 14px; }
  #drop-zone strong { color: var(--accent); }
  #file-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

  /* ── Preview ── */
  #preview-wrap { margin-top: 20px; display: none; }
  #preview-img {
    width: 100%; border-radius: 10px;
    border: 1px solid var(--border);
    max-height: 340px;
    object-fit: contain;
    background: #0b0f14;
  }

  /* ── Confidence Slider ── */
  .conf-row {
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .conf-row label { font-size: 13px; color: var(--muted); white-space: nowrap; }
  input[type=range] {
    flex: 1;
    accent-color: var(--accent);
  }
  #conf-val {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    width: 40px;
    text-align: right;
  }

  /* ── Detect Button ── */
  #detect-btn {
    margin-top: 20px;
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 10px;
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: opacity .15s, transform .1s;
  }
  #detect-btn:hover { opacity: .9; }
  #detect-btn:active { transform: scale(0.98); }
  #detect-btn:disabled { opacity: .4; cursor: not-allowed; }

  /* ── Results Panel ── */
  #empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 60px 0;
    color: var(--muted);
    font-size: 14px;
  }
  #empty-state .big { font-size: 48px; }

  .detection-card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 16px;
    border-radius: 10px;
    background: color-mix(in srgb, var(--accent) 6%, transparent);
    border: 1px solid color-mix(in srgb, var(--accent) 20%, transparent);
    margin-bottom: 10px;
    animation: slideIn .25s ease forwards;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .det-icon { font-size: 26px; }
  .det-info { flex: 1; }
  .det-class {
    font-family: var(--mono);
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .det-bar-wrap {
    margin-top: 6px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .det-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width .4s ease;
  }
  .det-conf {
    font-family: var(--mono);
    font-size: 16px;
    color: var(--accent);
    font-weight: 700;
  }

  .meta-row {
    display: flex;
    gap: 20px;
    margin-bottom: 16px;
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
  }
  .meta-row span { color: var(--text); }

  .json-block {
    margin-top: 20px;
    background: #090d11;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.6;
    overflow-x: auto;
    max-height: 200px;
    overflow-y: auto;
    color: #8aafcc;
  }

  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid transparent;
    border-top-color: #000;
    border-radius: 50%;
    animation: spin .6s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 16px;
    font-size: 12px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    font-family: var(--mono);
  }

  @media (max-width: 700px) {
    main { grid-template-columns: 1fr; padding: 20px; }
    header { padding: 16px 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-icon">🛒</div>
  <h1>GROCERY DETECTOR</h1>
  <span class="badge">YOLOv8 · Live</span>
</header>

<main>
  <!-- Upload Panel -->
  <div class="panel">
    <div class="panel-header">Input Image</div>
    <div class="panel-body">
      <div id="drop-zone">
        <input type="file" id="file-input" accept="image/*">
        <div class="icon">📦</div>
        <p>Drop an image here or <strong>click to browse</strong></p>
        <p style="margin-top:6px;font-size:12px;">JPG · PNG · WEBP</p>
      </div>

      <div id="preview-wrap">
        <img id="preview-img" alt="Preview">
      </div>

      <div class="conf-row">
        <label>Min confidence</label>
        <input type="range" id="conf-slider" min="5" max="95" value="25" step="5">
        <span id="conf-val">0.25</span>
      </div>

      <button id="detect-btn" disabled>Detect Products</button>
    </div>
  </div>

  <!-- Results Panel -->
  <div class="panel">
    <div class="panel-header">Detection Results</div>
    <div class="panel-body" id="results-body">
      <div id="empty-state">
        <span class="big">🔍</span>
        <p>Upload an image and click<br><strong>Detect Products</strong></p>
      </div>
    </div>
  </div>
</main>

<footer>Camera-Based Inventory System · Powered by YOLOv8 + FastAPI</footer>

<script>
const CLASS_ICONS = {
  rice:'🌾', oil_bottle:'🫙', soap:'🧼', detergent:'🧴', water_bottle:'💧',
  juice:'🍹', snack_packet:'🍿', cereal_box:'📦', canned_food:'🥫', bread:'🍞',
  bottle:'🍾', banana:'🍌', apple:'🍎', orange:'🍊', default:'📦'
};

const fileInput   = document.getElementById('file-input');
const dropZone    = document.getElementById('drop-zone');
const previewWrap = document.getElementById('preview-wrap');
const previewImg  = document.getElementById('preview-img');
const detectBtn   = document.getElementById('detect-btn');
const confSlider  = document.getElementById('conf-slider');
const confVal     = document.getElementById('conf-val');
const resultsBody = document.getElementById('results-body');

let selectedFile = null;

// Slider
confSlider.addEventListener('input', () => {
  confVal.textContent = (confSlider.value / 100).toFixed(2);
});

// File selection
function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  selectedFile = file;
  const url = URL.createObjectURL(file);
  previewImg.src = url;
  previewWrap.style.display = 'block';
  detectBtn.disabled = false;
}

fileInput.addEventListener('change', () => handleFile(fileInput.files[0]));

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  handleFile(e.dataTransfer.files[0]);
});

// Detect
detectBtn.addEventListener('click', async () => {
  if (!selectedFile) return;
  const conf = confSlider.value / 100;

  detectBtn.disabled = true;
  detectBtn.innerHTML = '<span class="spinner"></span>Detecting…';
  resultsBody.innerHTML = '';

  const fd = new FormData();
  fd.append('file', selectedFile);

  try {
    const res = await fetch(`/detect?confidence=${conf}`, { method: 'POST', body: fd });
    const data = await res.json();

    if (!res.ok) throw new Error(data.detail || 'Server error');
    renderResults(data);
  } catch (err) {
    resultsBody.innerHTML = `
      <div style="padding:20px;color:#ff6b6b;font-family:var(--mono);font-size:13px;">
        ⚠️ ${err.message}
      </div>`;
  } finally {
    detectBtn.disabled = false;
    detectBtn.innerHTML = 'Detect Products';
  }
});

function renderResults(data) {
  const dets = data.detections || [];
  let html = '';

  // Meta
  html += `<div class="meta-row">
    <div>Objects: <span>${dets.length}</span></div>
    <div>Latency: <span>${data.inference_ms ?? '—'} ms</span></div>
    <div>Mode: <span>${data.model_mode ?? '—'}</span></div>
  </div>`;

  if (dets.length === 0) {
    html += `<div style="padding:40px 0;text-align:center;color:var(--muted);font-size:14px;">
      No products detected above confidence threshold.</div>`;
  } else {
    dets.forEach((d, i) => {
      const icon = CLASS_ICONS[d.class] || CLASS_ICONS.default;
      const pct = Math.round(d.confidence * 100);
      html += `<div class="detection-card" style="animation-delay:${i * 60}ms">
        <span class="det-icon">${icon}</span>
        <div class="det-info">
          <div class="det-class">${d.class.replace(/_/g,' ')}</div>
          <div class="det-bar-wrap"><div class="det-bar" style="width:${pct}%"></div></div>
        </div>
        <div class="det-conf">${(d.confidence).toFixed(3)}</div>
      </div>`;
    });
  }

  // Raw JSON
  html += `<details style="margin-top:16px;">
    <summary style="cursor:pointer;font-size:12px;color:var(--muted);font-family:var(--mono);">
      Raw JSON response
    </summary>
    <pre class="json-block">${JSON.stringify(data, null, 2)}</pre>
  </details>`;

  resultsBody.innerHTML = html;
}
</script>
</body>
</html>
